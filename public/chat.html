<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>smog Chat</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="chat-container">
    <div class="header">
      <h2>smog - AI Chatbot</h2>
    </div>

    <div id="chat-box"></div>

    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Ask me anything..." required />
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- ADD BUTTON -->
  <button id="add-btn" style="position:fixed; top:10px; right:10px;">
    Add Q&A
  </button>

  <!-- ADD MODAL -->
  <div id="add-modal" style="display:none; position:fixed; top:20%; left:35%; background:white; padding:20px; border:1px solid black; z-index:999;">
    
    <h3>Add Q&A</h3>

    <form id="add-form">
      <input type="text" id="new-question" placeholder="Enter question" required /><br><br>
      <input type="text" id="new-answer" placeholder="Enter answer" required /><br><br>

      <button type="submit">Save</button>
      <button type="button" id="cancel-btn">Cancel</button>
    </form>

  </div>

<script>
const chatBox = document.getElementById('chat-box');

// ================= CHAT MESSAGE UI =================
function addMessage(from, text) {
  const div = document.createElement('div');
  div.textContent = `${from}: ${text}`;
  div.className = from === 'You' ? 'user-msg' : 'bot-msg';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}


// ================= CHAT SEND =================
document.getElementById('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const input = document.getElementById('user-input');
  const message = input.value.trim();
  if (!message) return;

  addMessage('You', message);

  const res = await fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  addMessage('smog', data.reply);

  input.value = '';
});


// ================= ADD BUTTON =================
const modal = document.getElementById('add-modal');

document.getElementById('add-btn').onclick = () => {
  modal.style.display = 'block';
};

document.getElementById('cancel-btn').onclick = () => {
  modal.style.display = 'none';
};


// ================= ADD Q&A =================
document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const question = document.getElementById('new-question').value;
  const answer = document.getElementById('new-answer').value;

  const res = await fetch('/add-qa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question, answer })
  });

  const result = await res.json();
  alert(result.message);

  document.getElementById('add-form').reset();
  modal.style.display = 'none';
});
</script>

</body>
</html>
